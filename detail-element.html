<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>好伴社計藍 組成元素 - 中興新村省府生活色譜</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="./assets/icons/app-logo.svg">
    
    <!-- Open Graph Metadata -->
    <meta property="og:title" content="好伴社計藍 組成元素 - 中興新村省府生活色譜">
    <meta property="og:description" content="記錄職人與建築留下的視覺痕跡，並將這些元素轉化為色彩與圖騰。">
    <meta property="og:image" content="./assets/images/og-image.jpg">
    <meta property="og:type" content="website">

    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <div class="app-container detail-view">
        <!-- 頂部導覽列 (150px 高, 20px 邊框間距) -->
        <header class="detail-header glass-effect">
            <button class="nav-btn glass-effect" onclick="window.location.href='index.html'" aria-label="回首頁">
                <img src="./assets/icons/home.svg" alt="Home">
            </button>
            <div class="header-titles">
                <h1 class="store-name title-24-36">好伴社計藍</h1>
                <div class="code-text body-14-21">TC-2026-03-24-01</div>
            </div>
            <!-- 切換回詳情資訊頁的按鈕 -->
            <button class="nav-btn glass-effect" aria-label="色票資訊" onclick="window.location.href='detail.html'">
                <img src="./assets/icons/menu.svg" alt="Menu">
            </button>
        </header>

        <!-- 右側專屬浮動導覽 (地圖、相機、下載) -->
        <nav class="detail-floating-nav">
            <button class="nav-btn glass-effect" aria-label="地圖"
                onclick="window.open('https://www.google.com/maps/search/?api=1&query=南投市中區綠川西街135號好伴社計', '_blank')">
                <img src="./assets/icons/location.svg" alt="Location">
            </button>
            <button class="nav-btn glass-effect" aria-label="拍照" onclick="window.location.href='camera.html'"><img
                    src="./assets/icons/camera.svg" alt="Camera"></button>
            <button class="nav-btn glass-effect" aria-label="下載"><img src="./assets/icons/download.svg"
                    alt="Download"></button>
        </nav>

        <!-- 主內容捲動區 -->
        <main class="detail-main">
            <!-- Hero區段：純秀背景 -->
            <div class="hero-section">
                <!-- 提示往下滑動的箭頭 -->
                <div class="scroll-arrow">
                    <img src="./assets/icons/back.svg" alt="Scroll Down">
                </div>
            </div>

            <!-- 內文各個獨立卡片展示區 -->
            <div class="cards-container">

                <!-- 完整色譜圖（放置於上方） -->
                <section id="card-full-palette" class="info-card glass-effect center-align">
                    <h2 class="title-bold" style="margin-bottom: 16px;">色譜展示</h2>
                    <img id="full-palette-img" src="" alt="色譜" style="width: 100%; height: auto; display: none;">
                </section>

                <!-- ① 色票應用比例（含「設計轉譯」標題，由 detail.js 動態填入，放在元素卡片上方） -->
                <section id="card-color-ratio" class="info-card glass-effect center-align" style="display:none;">
                    <h3 class="section-title">設計轉譯</h3>
                    <div id="color-ratio-bar" style="display:flex; height:50px; width:100%; margin-bottom: 8px;"></div>
                    <div id="color-ratio-label" class="body-12-18" style="text-align: right; margin-bottom: 24px;"></div>
                    <div id="color-spec-list"></div>
                </section>

                <!-- ② 元素轉換卡片群（由 detail.js 依資料動態生成，最多 5 組） -->
                <div id="element-cards-container"></div>

            </div>
        </main>

        <!-- 下載完成訊息視窗 -->
        <div id="download-toast" class="toast-overlay hidden" onclick="this.classList.add('hidden')">
            <div class="toast-panel glass-effect">
                <span class="body-16-24" style="white-space: nowrap;">色譜 <span id="download-shop-name">好伴社計藍</span> 已下載</span>
            </div>
        </div>
    </div>

    <script src="./js/detail.js"></script>
</body>

</html>
