<body>
    <!-- 滿版模糊打底背景 -->

        style="background-image: url('./assets/images/stores/001-HAPPEN/palette/001-HAPPEN-palette-main.png'); background-repeat: repeat; position: relative; background-size: 900px auto;">

        <!-- 內容主體區 -->
        <div
            style="position: relative; z-index: 2; height: 100%; display: flex; flex-direction: column; overflow-y: auto;">

            <!-- 頂部與首頁共通的玻璃導覽列 -->

                <button class="nav-btn glass-effect" onclick="window.location.href='index.html'" aria-label="回首頁">
                    <img src="./assets/icons/home.svg" alt="Home">
                </button>
                <div class="header-titles">

            <!-- 照片展示與按鈕組 -->
            <div
                style="flex: 1; display: flex; align-items: center; justify-content: center; position: relative; padding: 24px 48px 24px 32px;">
                <!-- 照片卡 -->

                    <!-- 影像本體 (利用 JS 模擬直式與橫式載入，並加上 crossorigin 協助 Canvas 合成) -->

                    <!-- 照片圖框疊加 -->

            <!-- 標本採集完成 純文字 -->

            <!-- 顏色自動萃取分析列表 -->

    <!-- 標本下載完成訊息視窗 -->

            <span class="body-16-24" style="color: #222; font-weight: 500;">標本已下載</span>
        </div>

    <!-- 為了展示您的雙版本橫直向需求，我設計了一個簡單的切換腳本 -->
    <script>
        const portraitData = {
            image: "https://images.unsplash.com/photo-1541414779316-d565ddfae155?q=80&w=800&auto=format&fit=crop", // 直排蜥蜴示意圖
            colors: [
                { hex: "E3E5CE", rgb: "227 229 206", bg: "#E3E5CE" },
                { hex: "550804", rgb: "85 8 4", bg: "#550804" },
                { hex: "A9B4B5", rgb: "169 180 181", bg: "#A9B4B5" }
            ]
        };

        const landscapeData = {
            image: "https://images.unsplash.com/photo-1504448574169-be5a57008e31?q=80&w=800&auto=format&fit=crop", // 橫向蜥蜴示意圖
            colors: [
                { hex: "CA7D45", rgb: "202 125 69", bg: "#CA7D45" },
                { hex: "815344", rgb: "129 83 68", bg: "#815344" },
                { hex: "30596F", rgb: "48 89 111", bg: "#30596F" }
            ]
        };

        let dynamicStoreName = '好伴社計藍';
        let dynamicStoreCode = 'TC-2026-03-24-01';
        let dynamicFrameLandscape = '';
        let dynamicFramePortrait = '';

        // ==========================================
        // 色彩萃取演算法 (簡化版 K-Means)
        // ==========================================
        function extractDominantColors(imgElement, k = 3) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            // 縮小取樣尺寸加速處理
            const SAMPLE_SIZE = 150;
            const ratio = Math.min(SAMPLE_SIZE / imgElement.naturalWidth, SAMPLE_SIZE / imgElement.naturalHeight, 1);
            canvas.width = Math.floor(imgElement.naturalWidth * ratio);
            canvas.height = Math.floor(imgElement.naturalHeight * ratio);
            ctx.drawImage(imgElement, 0, 0, canvas.width, canvas.height);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;

            // 收集像素 (跳過太暗、太亮、太透明的)
            const pixels = [];
            for (let i = 0; i < imageData.length; i += 4) {
                const r = imageData[i], g = imageData[i + 1], b = imageData[i + 2], a = imageData[i + 3];
                if (a < 128) continue; // 跳過透明
                const brightness = (r + g + b) / 3;
                if (brightness < 15 || brightness > 245) continue; // 跳過全黑全白
                pixels.push([r, g, b]);
            }
            if (pixels.length < k) return []; // 防呆

            // 初始化中心點：隨機取 k 個點
            let centers = [];
            const step = Math.floor(pixels.length / k);
            for (let i = 0; i < k; i++) centers.push([...pixels[i * step]]);

            // K-Means 迭代（最多 20 輪）
            for (let iter = 0; iter < 20; iter++) {
                const clusters = Array.from({ length: k }, () => []);
                // 分派
                for (const px of pixels) {
                    let minDist = Infinity, best = 0;
                    for (let c = 0; c < k; c++) {
                        const d = (px[0] - centers[c][0]) ** 2 + (px[1] - centers[c][1]) ** 2 + (px[2] - centers[c][2]) ** 2;
                        if (d < minDist) { minDist = d; best = c; }
                    }
                    clusters[best].push(px);
                }
                // 更新中心
                let converged = true;
                for (let c = 0; c < k; c++) {
                    if (clusters[c].length === 0) continue;
                    const avg = [0, 0, 0];
                    for (const px of clusters[c]) { avg[0] += px[0]; avg[1] += px[1]; avg[2] += px[2]; }
                    const newCenter = [Math.round(avg[0] / clusters[c].length), Math.round(avg[1] / clusters[c].length), Math.round(avg[2] / clusters[c].length)];
                    if (newCenter[0] !== centers[c][0] || newCenter[1] !== centers[c][1] || newCenter[2] !== centers[c][2]) converged = false;
                    centers[c] = newCenter;
                }
                if (converged) break;
            }

            // 計算各群佔比並排序（由大到小）
            const clusterSizes = Array.from({ length: k }, () => 0);
            for (const px of pixels) {
                let minDist = Infinity, best = 0;
                for (let c = 0; c < k; c++) {
                    const d = (px[0] - centers[c][0]) ** 2 + (px[1] - centers[c][1]) ** 2 + (px[2] - centers[c][2]) ** 2;
                    if (d < minDist) { minDist = d; best = c; }
                }
                clusterSizes[best]++;
            }

            const results = centers.map((c, i) => ({
                r: c[0], g: c[1], b: c[2],
                hex: ((1 << 24) + (c[0] << 16) + (c[1] << 8) + c[2]).toString(16).slice(1).toUpperCase(),
                count: clusterSizes[i]
            }));
            results.sort((a, b) => b.count - a.count);
            return results;
        }

        // ==========================================
        // 渲染色彩列表
        // ==========================================
        function renderColors(colors) {
            const colorContainer = document.getElementById('extracted-colors');
            colorContainer.innerHTML = '';
            colors.forEach(col => {
                const block = document.createElement('div');
                block.className = 'color-spec';
                block.style = 'display: flex; gap: 20px; align-items: center;';
                block.innerHTML = `
                    <div style="width: 48px; height: 48px; background-color: #${col.hex}; flex-shrink:0;"></div>
                    <div class="body-12-18" style="display: flex; flex: 1; align-items: center;">
                        <span style="flex:1">Hex &nbsp; ${col.hex}</span>
                        <span style="flex:1">RGB &nbsp; ${col.r} ${col.g} ${col.b}</span>
                    </div>
                `;
                colorContainer.appendChild(block);
            });
        }

        // ==========================================
        // 照片載入後自動萃取色彩
        // ==========================================
        function applyFrame() {
            const img = document.getElementById('result-photo');
            if (!img.naturalWidth) return;
            const isLandscape = img.naturalWidth >= img.naturalHeight;
            const frameUrl = isLandscape ? dynamicFrameLandscape : dynamicFramePortrait;
            
            const frameEl = document.getElementById('result-photo-frame');
            if (frameUrl) {
                frameEl.src = frameUrl;
                frameEl.style.display = 'block';
                preloadFrameForDownload(frameUrl);
            } else {
                frameEl.style.display = 'none';
                preloadedFrameImg = null;
            }
        }

        function analyzePhoto() {
            const img = document.getElementById('result-photo');
            if (!img.naturalWidth) return; // 圖片尚未載入
            try {
                const colors = extractDominantColors(img, 3);
                if (colors.length > 0) renderColors(colors);
                applyFrame(); // 套用圖框
            } catch (e) {
                console.warn('色彩萃取失敗 (可能跨域限制)', e);
            }
        }

        const resultImg = document.getElementById('result-photo');

        // 若為使用者自行上傳或拍攝的圖片，從 sessionStorage 覆蓋
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('upload') === '1') {
            const uploadedImg = sessionStorage.getItem('uploadedImage');
            if (uploadedImg) {
                resultImg.src = uploadedImg;
            }
        }

        // 圖片載入完成後自動分析
        resultImg.addEventListener('load', analyzePhoto);
        if (resultImg.complete) analyzePhoto(); // 若已快取則立即分析

        let preloadedFrameImg = null;

        function preloadFrameForDownload(url) {
            if (!url) return;
            console.log('[下載準備] 開始預載圖框:', url);
            const tempImg = new Image();
            if (url.startsWith('http')) {
                tempImg.crossOrigin = 'anonymous'; // 協助 Canvas 合成
            }
            tempImg.onload = () => {
                preloadedFrameImg = tempImg;
                console.log('[下載準備] 圖框預載完成', tempImg.width, 'x', tempImg.height);
            };
            tempImg.onerror = () => {
                console.warn('[下載準備] 圖框載入失敗:', url);
            };
            tempImg.src = url;
        }

        // 執行 Canvas 合成下載與觸發 Toast
        function downloadCompositePhoto() {
            console.log('[下載] 開始合成，preloadedFrameImg =', preloadedFrameImg ? 'ready' : 'null');
            const toast = document.getElementById('download-toast');
            toast.style.display = 'flex';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);

            const img = document.getElementById('result-photo');
            if (!img.naturalWidth) return; 

            const result = tryComposite(img);
            if (result) {
                doDownload(result);
            } else {
                alert('下載功能受限，請確認網頁環境與圖框來源。');
            }
        }

        // 嘗試在 Canvas 上合成圖片，回傳 dataURL 或 null
        function tryComposite(img) {
            try {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = img.naturalWidth;
                canvas.height = img.naturalHeight;

                // 1. 繪製相片
                ctx.drawImage(img, 0, 0);

                // 2. 繪製圖框
                if (preloadedFrameImg && preloadedFrameImg.width > 0) {
                    ctx.drawImage(preloadedFrameImg, 0, 0, canvas.width, canvas.height);
                    console.log('[下載] 圖框已疊加');
                }

                // 3. 嘗試匯出
                const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
                console.log('[下載] canvas 匯出成功');
                return dataUrl;
            } catch (e) {
                console.warn('[下載] canvas 匯出失敗:', e.message);
                return null;
            }
        }

        // 執行下載
        function doDownload(dataUrl) {
            const link = document.createElement('a');
            link.download = `色譜標本_${dynamicStoreCode}.jpg`;
            link.href = dataUrl;
            document.body.appendChild(link);
            link.click();
            setTimeout(() => document.body.removeChild(link), 200);
            console.log('[下載] 下載完成');
        }

        // ==========================================
        // 從資料庫載入該店家的色譜圖片與資訊
        // ==========================================
        const params = new URLSearchParams(window.location.search);
        const shopId = params.get('id');

        if (shopId) {

            (async () => {
                try {
                    const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
                    const supabase = createClient(
                        'https://ccqcmzsopezfmmmvlqlr.supabase.co',
                        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNjcWNtenNvcGV6Zm1tbXZscWxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MTE4NjUsImV4cCI6MjA5MDk4Nzg2NX0.v2T_HyAYnwW2wSNBYVUdtRCDMTyffIFQ5nU-JLwvMI4'
                    );
                    const { data, error } = await supabase.from('shops').select('*').eq('id', shopId).single();
                    if (!error && data) {
                        if (data.image) {
                            // 設定頁面背景底圖
                            document.getElementById('result-container').style.backgroundImage = `url('${data.image}')`;
                        }
                        if (data.photo_frame_landscape) dynamicFrameLandscape = data.photo_frame_landscape;
                        if (data.photo_frame_portrait) dynamicFramePortrait = data.photo_frame_portrait;
                        
                        applyFrame(); // 取得資料後嘗試套用正確方向的圖框

                        if (data.name) {
                            dynamicStoreName = data.name;
                            const nameEls = document.querySelectorAll('.store-name');
                            nameEls.forEach(el => el.textContent = data.name);
                        }
                        const finalCode = data.code || data.slug;
                        if (finalCode) {
                            dynamicStoreCode = finalCode;
                            const codeEls = document.querySelectorAll('.code-text');
                            codeEls.forEach(el => el.textContent = finalCode);
                        }
                    }
                } catch (err) {
                    console.error('載入資料失敗', err);
                }
            })();
        }
    </script>

    <!-- 採集時光選擇視窗 -->
    <div id="capture-modal-overlay" class="modal-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; align-items: center; justify-content: center; z-index: 200; background: rgba(0,0,0,0.5);">
        <div class="modal-panel glass-effect" style="display: flex; flex-direction: column; align-items: center; padding: 32px 40px; border-radius: 24px; gap: 24px; background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); box-shadow: 0 8px 32px rgba(0,0,0,0.15);">
            <h3 class="body-16-24" style="font-weight: 500; color: #111;">重新採集時光</h3>
            <div style="display: flex; flex-direction: column; gap: 16px;">
                <button class="nav-btn glass-effect" id="btn-modal-camera" style="width: 80px; height: 80px; border-radius: 20px; display: flex; align-items: center; justify-content: center;">
                    <img src="./assets/icons/camera.svg" alt="相機" style="width: 32px; height: 32px;">
                </button>
                <label class="nav-btn glass-effect" style="width: 80px; height: 80px; border-radius: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; margin: 0;">
                    <img src="./assets/icons/image.svg" alt="相簿" style="width: 32px; height: 32px;">
                    <input type="file" accept="image/*" style="display:none;" id="btn-modal-upload">
                </label>
            </div>
        </div>
    </div>

    <script>
        // 採集時光選擇視窗邏輯
        (function() {
            const retakeBtn = document.getElementById('btn-retake');
            const captureModal = document.getElementById('capture-modal-overlay');
            const params = new URLSearchParams(window.location.search);
            const currentShopId = params.get('id') || '';

            // 點擊重拍按鈕 → 開啟選擇視窗
            retakeBtn.addEventListener('click', () => {
                captureModal.style.display = 'flex';
            });

            // 點擊背景關閉
            captureModal.addEventListener('click', (e) => {
                if (e.target === captureModal) captureModal.style.display = 'none';
            });

            // 選擇相機
            document.getElementById('btn-modal-camera').addEventListener('click', () => {
                window.location.href = currentShopId ? `camera.html?id=${currentShopId}` : 'camera.html';
            });

            // 選擇上傳圖片
            document.getElementById('btn-modal-upload').addEventListener('change', (e) => {
                if (e.target.files && e.target.files[0]) {
                    const file = e.target.files[0];
                    const reader = new FileReader();
                    reader.onload = function(evt) {
                        try {
                            sessionStorage.setItem('uploadedImage', evt.target.result);
                            window.location.href = currentShopId
                                ? `result.html?id=${currentShopId}&upload=1`
                                : 'result.html?upload=1';
                        } catch (err) {
                            alert('圖片檔案過大，無法載入');
                            captureModal.style.display = 'none';
                        }
                    };
                    reader.readAsDataURL(file);
                }
            });
        })();
    </script>
</body>
