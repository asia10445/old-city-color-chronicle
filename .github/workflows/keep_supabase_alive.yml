name: Supabase Keep Alive

on:
  schedule:
    # 每 3 天的凌晨 0:00 (UTC時間) 自動執行一次
    - cron: '0 0 */3 * *'
  workflow_dispatch: # 允許你手動點擊按鈕測試

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Send API Request to Supabase
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/shops?select=*" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
